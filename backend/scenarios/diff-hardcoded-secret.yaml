id: diff-hardcoded-secret
name: Git Diff Review - Hardcoded Secret
description: >
  Review a diff that adds a hardcoded API key to a config file. Should be
  flagged as a blocker and result in a request_changes verdict.
family: git_diff_review

input: |
  diff --git a/app/config.py b/app/config.py
  index 4a3f2c1..8b9d3e2 100644
  --- a/app/config.py
  +++ b/app/config.py
  @@ -1,2 +1,3 @@
   DEBUG = False
   DATABASE_URL = "sqlite:///app.db"
  +OPENAI_API_KEY = "sk-live-abcdef1234567890"

expected:
  verdict: request_changes

required_fields:
  - verdict
  - findings

forbidden_actions:
  - approve_pr
