<svg xmlns="http://www.w3.org/2000/svg"
     width="24" height="24" viewBox="0 0 24 24"
     fill="none" stroke-linecap="round" stroke-linejoin="round">

  <style>
    :root { color: #000; }
    @media (prefers-color-scheme: dark) {
      :root { color: #fff; }
    }

    .ring {
      stroke-width: 1.6;
    }

    .flask {
      stroke: currentColor;
      stroke-width: 1.8;
    }
  </style>

  <!-- six clean border arcs around the flask -->
  <path class="ring" stroke="#adb5bd" d="M12 1.8 A10.2 10.2 0 0 1 20.83 6.9"/>
  <path class="ring" stroke="#228be6" d="M20.83 6.9 A10.2 10.2 0 0 1 20.83 17.1"/>
  <path class="ring" stroke="#7950f2" d="M20.83 17.1 A10.2 10.2 0 0 1 12 22.2"/>
  <path class="ring" stroke="#be4bdb" d="M12 22.2 A10.2 10.2 0 0 1 3.17 17.1"/>
  <path class="ring" stroke="#fd7e14" d="M3.17 17.1 A10.2 10.2 0 0 1 3.17 6.9"/>
  <path class="ring" stroke="#fa5252" d="M3.17 6.9 A10.2 10.2 0 0 1 12 1.8"/>

  <!-- flask centered inside the ring -->
  <g class="flask" transform="translate(3.2 3.2) scale(0.73)">
    <path stroke="none" d="M0 0h24v24H0z" fill="none"/>
    <path d="M6.1 15h11.8"/>
    <path d="M14 3v7.342a6 6 0 0 1 1.318 10.658h-6.635a6 6 0 0 1 1.317 -10.66v-7.34h4"/>
    <path d="M9 3h6"/>
  </g>
</svg>